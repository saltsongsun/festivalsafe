  <meta name="theme-color" content="#0a0d1a" />

  <title>SAFEFLOW · 축제 안전관리</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{background:#0a0d1a;-webkit-font-smoothing:antialiased;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Pretendard',Roboto,sans-serif;overscroll-behavior:none}

    /* Splash Screen */
    #splash{position:fixed;inset:0;z-index:99999;background:linear-gradient(180deg,#0a0d1a 0%,#0b0e17 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s ease-out,visibility 0.6s ease-out}
    #splash.hide{opacity:0;visibility:hidden;pointer-events:none}
    #splash::before{content:"";position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(66,165,245,0.15) 0%,transparent 70%);filter:blur(40px);animation:pulse-bg 4s ease-in-out infinite}
    .splash-logo{position:relative;z-index:1;width:120px;height:120px;border-radius:32px;background:linear-gradient(135deg,rgba(66,165,245,0.3),rgba(66,165,245,0.05));border:1px solid rgba(66,165,245,0.4);box-shadow:0 0 40px rgba(66,165,245,0.3),inset 0 1px 0 rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;animation:logo-float 3s ease-in-out infinite;margin-bottom:32px}
    .splash-logo svg{width:64px;height:64px}
    .splash-title{position:relative;z-index:1;color:#fff;font-size:38px;font-weight:800;letter-spacing:6px;margin-bottom:12px;text-shadow:0 0 30px rgba(66,165,245,0.5)}
    .splash-sub{position:relative;z-index:1;color:#94A3B8;font-size:14px;font-weight:500;letter-spacing:2px;text-transform:uppercase;margin-bottom:48px}
    .splash-loading{position:relative;z-index:1;width:200px;height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden}
    .splash-loading::after{content:"";display:block;width:40%;height:100%;background:linear-gradient(90deg,transparent,#42A5F5,transparent);animation:loading-slide 1.5s ease-in-out infinite}
    @keyframes pulse-bg{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.1);opacity:0.9}}
    @keyframes logo-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes loading-slide{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
    #error-fallback{display:none;min-height:100vh;background:#0a0d1a;align-items:center;justify-content:center;padding:24px}
    #error-fallback.show{display:flex}
  </style>
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash">
    <div class="splash-logo">
      <svg viewBox="0 0 64 64" fill="none">
        <path d="M32 4L8 14V30C8 44 18 56 32 60C46 56 56 44 56 30V14L32 4Z" stroke="#42A5F5" stroke-width="2.5" fill="rgba(66,165,245,0.1)"/>
        <path d="M22 32L29 39L42 24" stroke="#42A5F5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="splash-title">SAFEFLOW</div>
    <div class="splash-sub">축제 안전관리 플랫폼</div>
    <div class="splash-loading"></div>
  </div>

  <script>
    // ?reset=1 → 즉시 데이터 초기화
    if(location.search.includes('reset=1')){
      try{localStorage.clear();sessionStorage.clear();}catch(e){}
      location.replace(location.pathname);
    }
    // 스플래시 자동 제거
    window.addEventListener('load', function(){
      setTimeout(function(){
        var splash = document.getElementById('splash');
        if(splash) {
          splash.classList.add('hide');
          setTimeout(function(){ splash.remove(); }, 700);
        }
      }, 1200);
    });
  </script>

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- 🔄 SUPABASE 동기화 (ESM CDN - npm install 불필요)                  -->
  <!-- ════════════════════════════════════════════════════════════════════ -->
  <script type="module">
    (async () => {
      try {
        // localStorage에서 URL/Key 읽기 (사용자가 직접 입력)
        const url = localStorage.getItem('_sb_url') || '';
        const key = localStorage.getItem('_sb_key') || '';

        if (url.startsWith('http') && key.length > 20) {
          console.log('[SAFEFLOW] Supabase 로딩 중...', url);
          const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2.39.0');
          const supabase = createClient(url, key, {
            realtime: { params: { eventsPerSecond: 10 } }
          });

          // window.storage 인터페이스 (usePersist에서 호출)
          window.storage = {
            async get(k) {
              try {
                const { data, error } = await supabase.from('app_state').select('value').eq('key', k).maybeSingle();
                if (error) { console.error('[storage.get]', k, error.message); return null; }
                if (!data) return null;
                const v = typeof data.value === 'string' ? data.value : JSON.stringify(data.value);
                return { value: v };
              } catch (e) { console.error('[storage.get] 예외:', e); return null; }
            },
            async set(k, v) {
              try {
                const json = typeof v === 'string' ? v : JSON.stringify(v);
                let stored;
                try { stored = JSON.parse(json); } catch { stored = json; }
                const { error } = await supabase.from('app_state').upsert(
                  { key: k, value: stored, updated_at: new Date().toISOString() },
                  { onConflict: 'key' }
                );
                if (error) { console.error('[storage.set]', k, error.message); return null; }
                return { value: json };
              } catch (e) { console.error('[storage.set] 예외:', e); return null; }
            },
            async delete(k) {
              try { await supabase.from('app_state').delete().eq('key', k); return { deleted: true }; }
              catch { return null; }
            },
            async list(prefix) {
              try {
                let q = supabase.from('app_state').select('key');
                if (prefix) q = q.like('key', prefix + '%');
                const { data } = await q;
                return { keys: (data || []).map(d => d.key) };
              } catch { return null; }
            },
          };

          // Realtime 구독
          supabase
            .channel('app_state_changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'app_state' }, (payload) => {
              const row = payload.new || payload.old;
              if (!row?.key) return;
              const v = typeof row.value === 'string' ? row.value : JSON.stringify(row.value);
              window.dispatchEvent(new CustomEvent('supabase-sync', { detail: { key: row.key, value: v } }));
              console.log('[SAFEFLOW] 📡 동기화 수신:', row.key.slice(0, 60));
            })
            .subscribe((status) => {
              console.log('[SAFEFLOW] Realtime:', status);
              window._sbStatus = { ok: status === 'SUBSCRIBED', status };
              window.dispatchEvent(new CustomEvent('sb-status'));
              if (status === 'SUBSCRIBED') console.log('[SAFEFLOW] ✅ Realtime 구독 성공 - 기기간 동기화 활성화');
              if (status === 'CHANNEL_ERROR') console.error('[SAFEFLOW] ❌ Realtime 오류 - Database → Replication에서 app_state 토글 ON 확인');
            });

          // 디버그 헬퍼
          window._safeflow = {
            async checkConnection() {
              const { count, error } = await supabase.from('app_state').select('*', { count: 'exact', head: true });
              if (error) { console.error('❌ DB 접근 실패:', error.message); return false; }
              console.log('✅ Supabase 정상 - app_state 레코드:', count); return true;
            },
            async listKeys() {
              const { data } = await supabase.from('app_state').select('key, updated_at').order('updated_at', { ascending: false });
              console.table(data); return data;
            },
          };

          console.log('[SAFEFLOW] ✅ Supabase 연결 완료');
          window._sbStatus = { ok: true };
          window.dispatchEvent(new CustomEvent('sb-status'));
        } else {
          console.warn('[SAFEFLOW] ⚠️ Supabase 설정 필요 - ⚙️ 관리 → 🔄 기기간 동기화 카드에서 입력하세요');
          window._sbStatus = { ok: false, reason: 'no_config' };
          window.dispatchEvent(new CustomEvent('sb-status'));
        }
      } catch (e) {
        console.error('[SAFEFLOW] Supabase 로드 실패:', e);
        window._sbStatus = { ok: false, reason: 'load_error', error: String(e.message || e) };
        window.dispatchEvent(new CustomEvent('sb-status'));
      }
    })();
  </script>

  <div id="root"></div>

  <div id="error-fallback">
    <div style="max-width:520px;width:100%">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:64px;margin-bottom:16px">⚠️</div>
        <h2 style="color:#F44336;font-size:22px;font-weight:800;margin-bottom:8px">앱 로드 실패</h2>
        <p style="color:#8892b0;font-size:14px">아래 옵션 중 하나를 선택하세요</p>
      </div>

      <!-- 🩺 진단 패널 -->
      <div id="diag-panel" style="background:rgba(33,150,243,0.06);border:1px solid rgba(33,150,243,0.2);border-radius:12px;padding:14px;margin-bottom:14px">
        <div style="color:#42A5F5;font-size:13px;font-weight:700;margin-bottom:8px">🩺 진단 정보</div>
        <div id="diag-info" style="color:#94A3B8;font-size:11px;line-height:1.6;font-family:monospace"></div>
      </div>

      <!-- Supabase 직접 설정 -->
      <div style="background:rgba(76,175,80,0.06);border:1px solid rgba(76,175,80,0.2);border-radius:12px;padding:14px;margin-bottom:14px">
        <div style="color:#66BB6A;font-size:13px;font-weight:700;margin-bottom:8px">🔄 Supabase 동기화 설정</div>
        <input id="ef-url" placeholder="https://xxx.supabase.co" style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.3);color:#fff;font-size:12px;font-family:monospace;margin-bottom:6px;box-sizing:border-box" />
        <input id="ef-key" placeholder="anon public key (eyJh...)" style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.3);color:#fff;font-size:12px;font-family:monospace;margin-bottom:6px;box-sizing:border-box" />
        <div style="display:flex;gap:6px">
          <button id="btn-save-sb" style="flex:1;padding:10px;border-radius:8px;border:none;background:#66BB6A;color:#fff;font-size:13px;font-weight:700;cursor:pointer">✅ 저장 후 재시작</button>
          <button id="btn-clear-sb" style="padding:10px 14px;border-radius:8px;border:1px solid rgba(244,67,54,0.3);background:transparent;color:#EF5350;font-size:12px;cursor:pointer">🗑 삭제</button>
        </div>
      </div>

      <button id="btn-reset" style="width:100%;padding:14px;border-radius:12px;border:none;background:#F44336;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px">🔄 모든 데이터 초기화 후 재시작</button>
      <button id="btn-retry" style="width:100%;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#94A3B8;font-size:13px;cursor:pointer">🔃 그냥 새로고침 (캐시 무시)</button>
      <p style="color:#556;font-size:11px;margin-top:14px;text-align:center">💡 안 되면 F12 → Console 메시지 확인</p>
    </div>
  </div>

  <script>
    // 진단 정보 채우기
    function fillDiag() {
      var diag = document.getElementById('diag-info');
      if (!diag) return;
      var info = [];
      info.push('🌐 URL: ' + location.href);
      info.push('📦 Build: ' + new Date().toISOString().slice(0, 10));
      info.push('💾 Supabase URL: ' + (localStorage.getItem('_sb_url') ? '✅ 저장됨' : '❌ 없음'));
      info.push('🔑 Supabase Key: ' + (localStorage.getItem('_sb_key') ? '✅ 저장됨' : '❌ 없음'));
      info.push('🔌 window.storage: ' + (window.storage ? '✅ 정의됨' : '❌ 없음'));
      info.push('📡 Supabase 상태: ' + (window._sbStatus ? JSON.stringify(window._sbStatus) : '미확인'));
      info.push('🛠️ Service Worker: ' + ('serviceWorker' in navigator ? '지원' : '미지원'));
      diag.innerHTML = info.join('<br>');
      // 저장된 값 채우기
      var urlInp = document.getElementById('ef-url');
      var keyInp = document.getElementById('ef-key');
      if (urlInp && localStorage.getItem('_sb_url')) urlInp.value = localStorage.getItem('_sb_url');
      if (keyInp && localStorage.getItem('_sb_key')) keyInp.value = localStorage.getItem('_sb_key');
    }
    setTimeout(fillDiag, 100);
    setInterval(fillDiag, 2000);

    document.getElementById('btn-reset').addEventListener('click', function(){
      if (!confirm('⚠️ 모든 로컬 데이터가 삭제됩니다 (Supabase 데이터는 유지).\n\n진행하시겠습니까?')) return;
      try {
        // Supabase 설정은 보존
        var url = localStorage.getItem('_sb_url');
        var key = localStorage.getItem('_sb_key');
        localStorage.clear(); sessionStorage.clear();
        if (url) localStorage.setItem('_sb_url', url);
        if (key) localStorage.setItem('_sb_key', key);
      } catch(e){}
      // PWA 캐시 삭제
      if ('caches' in window) {
        caches.keys().then(function(names){
          names.forEach(function(n){ caches.delete(n); });
          location.replace(location.pathname);
        });
      } else {
        location.replace(location.pathname);
      }
    });

    document.getElementById('btn-retry').addEventListener('click', function(){
      // SW 캐시 무시 새로고침
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs){
          regs.forEach(function(r){ r.unregister(); });
          location.reload(true);
        });
      } else {
        location.reload(true);
      }
    });

    document.getElementById('btn-save-sb').addEventListener('click', function(){
      var url = document.getElementById('ef-url').value.trim();
      var key = document.getElementById('ef-key').value.trim();
      if (!url || !key) { alert('URL과 Key를 모두 입력하세요'); return; }
      if (!url.startsWith('http')) { alert('URL은 https://로 시작해야 합니다'); return; }
      // REST API로 테스트
      var cleanUrl = url.replace(/\/$/, '');
      fetch(cleanUrl + '/rest/v1/app_state?select=key&limit=1', {
        headers: { 'apikey': key, 'Authorization': 'Bearer ' + key }
      }).then(function(res){
        if (!res.ok) {
          return res.text().then(function(t){
            alert('❌ 연결 실패 (HTTP ' + res.status + ')\n\n' + t.slice(0, 300) + '\n\n확인 사항:\n• URL/Key가 정확한가\n• app_state 테이블이 존재하는가\n• RLS 정책이 SELECT 허용하는가');
          });
        }
        localStorage.setItem('_sb_url', url);
        localStorage.setItem('_sb_key', key);
        alert('✅ 연결 성공!\n\n페이지를 재시작합니다.');
        location.replace(location.pathname);
      }).catch(function(e){
        alert('❌ 네트워크 오류: ' + e.message);
      });
    });

    document.getElementById('btn-clear-sb').addEventListener('click', function(){
      if (!confirm('Supabase 설정을 삭제하시겠습니까?')) return;
      localStorage.removeItem('_sb_url');
      localStorage.removeItem('_sb_key');
      alert('✅ Supabase 설정 삭제됨');
      fillDiag();
    });
  </script>

  <script type="module" src="/src/main.jsx" onerror="document.getElementById('error-fallback').classList.add('show');var sp=document.getElementById('splash');if(sp)sp.remove();"></script>
  <script>setTimeout(function(){if(!document.getElementById('root').children.length){document.getElementById('error-fallback').classList.add('show');var sp=document.getElementById('splash');if(sp)sp.remove();}},8000)</script>

  <script>
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(function(reg) {
      setInterval(function() { reg.update(); }, 60000);
      reg.addEventListener('updatefound', function() {
        var nw = reg.installing;
        if (nw) nw.addEventListener('statechange', function() {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            window.dispatchEvent(new CustomEvent('sw-update-available'));
          }
        });
      });
    }).catch(function(){});
    navigator.serviceWorker.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'SW_UPDATED') {
        window.dispatchEvent(new CustomEvent('sw-update-available'));
      }
    });
    navigator.serviceWorker.addEventListener('controllerchange', function() {
      if (window._swUpdating) window.location.reload();
    });
    window.applySwUpdate = function() {
      window._swUpdating = true;
      navigator.serviceWorker.getRegistration().then(function(reg) {
        if (reg && reg.waiting) reg.waiting.postMessage('skipWaiting');
        else window.location.reload();
      });
    };
  }

  // PWA 설치
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    deferredPrompt = e;
    window._pwaInstallable = true;
    window.dispatchEvent(new CustomEvent('pwa-installable'));
  });
  window.installPWA = function(){
    if(!deferredPrompt){ alert('이미 설치되어 있거나 이 브라우저에서는 설치를 지원하지 않습니다.\n\niOS Safari: 공유 → 홈 화면에 추가\nAndroid Chrome: 메뉴 → 앱 설치'); return; }
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(){
      deferredPrompt = null;
      window._pwaInstallable = false;
    });
  };
  window.addEventListener('appinstalled', function(){
    window._pwaInstallable = false;
    deferredPrompt = null;
  });
  </script>
</body>
</html>
